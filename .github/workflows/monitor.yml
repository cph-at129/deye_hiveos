name: Deye Battery Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-battery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Debug env
        run: |
          echo "TOKEN: ${HIVEOS_API_TOKEN:+SET}"
          echo "FARMS: ${HIVE_FARM_IDS:+SET}"

      - name: Run Monitor Script
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DEYE_EMAIL: ${{ secrets.DEYE_EMAIL }}
          DEYE_PASSWORD: ${{ secrets.DEYE_PASSWORD }}
          DEVICE_SN: ${{ secrets.DEVICE_SN }}
          HIVEOS_API_TOKEN: ${{ secrets.HIVEOS_API_TOKEN }}
          HIVE_FARM_IDS: ${{ secrets.HIVE_FARM_IDS }}
          HIVEOS_API_BASE: ${{ vars.HIVEOS_API_BASE }}
          MINING_START_SOC: ${{ vars.MINING_START_SOC }}
          MINING_STOP_SOC: ${{ vars.MINING_STOP_SOC }}
        run: python deye_monitor.py

      - name: Save Mining State
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add mining_control_state.txt || true
          git commit -m "Update Hive mining control state" || true
          git push || true
